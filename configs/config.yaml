data:
  root: data/fer2013/archive
  image_size: 48
  num_classes: 7
  num_workers: 4
  class_names:
  - Angry
  - Disgust
  - Fear
  - Happy
  - Sad
  - Surprise
  - Neutral

training:
  batch_size: 128
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  patience: 15
  label_smoothing: 0.1
  optimizer: adamw       # adamw | adam
  scheduler: cosine      # cosine | plateau
  device: auto

augmentation:
  horizontal_flip: 0.5
  rotation_degrees: 10
  brightness: 0.2
  contrast: 0.15
  zoom_scale:
  - 0.9
  - 1.1
  gaussian_noise_std: 15

model:
  name: deep_cnn         # baseline_cnn | deep_cnn | resnet50 | efficientnet_b0
  pretrained: true
  dropout: 0.4

paths:
  checkpoints: checkpoints/
  logs: logs/
  results: results/

preprocessing:
  mean: 0.563
  std: 0.2627
  use_custom_transforms: false   # CLAHE + GaussianNoise désactivés
